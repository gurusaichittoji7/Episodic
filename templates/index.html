<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Episodic</title>
  <link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=DM+Mono:wght@300;400;500&display=swap" rel="stylesheet"/>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:         #0c0c0f;
      --surface:    #13131a;
      --border:     #1e1e2e;
      --accent:     #a78bfa;
      --accent-dim: #6d5aac;
      --text:       #e2e0f0;
      --muted:      #5a5870;
      --user-bg:    #1a1a2e;
      --bot-bg:     #111118;
      --danger:     #f87171;
    }

    html, body {
      height: 100%;
      background: var(--bg);
      color: var(--text);
      font-family: 'DM Mono', monospace;
      font-size: 14px;
      overflow: hidden;
    }

    body::before {
      content: '';
      position: fixed; inset: 0;
      background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.04'/%3E%3C/svg%3E");
      pointer-events: none; z-index: 0;
    }

    .shell {
      position: relative; z-index: 1;
      display: grid;
      grid-template-rows: auto 1fr auto;
      height: 100vh;
      max-width: 780px;
      margin: 0 auto;
    }

    header {
      padding: 24px 32px 20px;
      border-bottom: 1px solid var(--border);
      display: flex;
      align-items: center;
      justify-content: space-between;
    }

    .brand { display: flex; align-items: baseline; gap: 10px; }

    .brand h1 {
      font-family: 'DM Serif Display', serif;
      font-size: 26px;
      letter-spacing: -0.5px;
      color: var(--text);
    }

    .brand h1 span { color: var(--accent); font-style: italic; }

    .brand .tagline {
      font-size: 11px;
      color: var(--muted);
      letter-spacing: 0.08em;
      text-transform: uppercase;
    }

    .header-right { display: flex; align-items: center; gap: 16px; }

    .turn-counter { font-size: 11px; color: var(--muted); letter-spacing: 0.05em; }
    .turn-counter span { color: var(--accent); font-weight: 500; }

    #clear-btn {
      background: none;
      border: 1px solid var(--border);
      color: var(--muted);
      font-family: 'DM Mono', monospace;
      font-size: 11px;
      letter-spacing: 0.06em;
      padding: 6px 14px;
      border-radius: 4px;
      cursor: pointer;
      transition: all 0.2s;
      text-transform: uppercase;
    }

    #clear-btn:hover { border-color: var(--danger); color: var(--danger); }

    #chat {
      overflow-y: auto;
      padding: 28px 32px;
      display: flex;
      flex-direction: column;
      gap: 20px;
      scroll-behavior: smooth;
    }

    #chat::-webkit-scrollbar { width: 4px; }
    #chat::-webkit-scrollbar-track { background: transparent; }
    #chat::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }

    .empty-state { margin: auto; text-align: center; opacity: 0.5; }
    .empty-state .icon { font-size: 36px; margin-bottom: 12px; }
    .empty-state p {
      font-family: 'DM Serif Display', serif;
      font-style: italic;
      font-size: 16px;
      color: var(--muted);
      line-height: 1.5;
    }
    .empty-state small {
      display: block; margin-top: 6px;
      font-size: 11px; color: var(--muted);
      opacity: 0.6; letter-spacing: 0.05em;
    }

    .msg { display: flex; gap: 14px; animation: fadeUp 0.3s ease; }
    .msg.user { flex-direction: row-reverse; }

    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(10px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    .avatar {
      width: 30px; height: 30px;
      border-radius: 6px; flex-shrink: 0;
      display: flex; align-items: center;
      justify-content: center;
      font-size: 13px; margin-top: 2px;
    }

    .msg.user .avatar { background: var(--accent-dim); color: #fff; }
    .msg.bot  .avatar { background: var(--border); color: var(--accent); }

    .bubble {
      max-width: 72%;
      padding: 12px 16px;
      border-radius: 8px;
      line-height: 1.65;
      font-size: 13.5px;
    }

    .msg.user .bubble {
      background: var(--user-bg);
      border: 1px solid #252540;
      color: var(--text);
      border-bottom-right-radius: 2px;
    }

    .msg.bot .bubble {
      background: var(--bot-bg);
      border: 1px solid var(--border);
      color: #ccc8e8;
      border-bottom-left-radius: 2px;
    }

    .bubble p { margin-bottom: 8px; }
    .bubble p:last-child { margin-bottom: 0; }
    .bubble code {
      background: rgba(167,139,250,0.1);
      color: var(--accent);
      padding: 1px 5px;
      border-radius: 3px;
      font-size: 12px;
    }

    .typing .bubble { display: flex; gap: 5px; align-items: center; padding: 14px 18px; }

    .dot {
      width: 6px; height: 6px;
      background: var(--accent-dim);
      border-radius: 50%;
      animation: blink 1.2s infinite;
    }
    .dot:nth-child(2) { animation-delay: 0.2s; }
    .dot:nth-child(3) { animation-delay: 0.4s; }

    @keyframes blink {
      0%, 80%, 100% { opacity: 0.2; transform: scale(0.9); }
      40%            { opacity: 1;   transform: scale(1.1); }
    }

    footer { padding: 20px 32px 28px; border-top: 1px solid var(--border); }

    .input-row { display: flex; gap: 10px; align-items: flex-end; }

    #user-input {
      flex: 1;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 12px 16px;
      color: var(--text);
      font-family: 'DM Mono', monospace;
      font-size: 13.5px;
      resize: none;
      line-height: 1.5;
      min-height: 46px;
      max-height: 140px;
      transition: border-color 0.2s;
      outline: none;
    }

    #user-input:focus { border-color: var(--accent-dim); }
    #user-input::placeholder { color: var(--muted); }

    #send-btn {
      background: var(--accent);
      border: none;
      color: #0c0c0f;
      font-family: 'DM Mono', monospace;
      font-size: 13px;
      font-weight: 500;
      padding: 12px 20px;
      border-radius: 8px;
      cursor: pointer;
      transition: opacity 0.2s, transform 0.1s;
      white-space: nowrap;
      height: 46px;
    }

    #send-btn:hover  { opacity: 0.85; }
    #send-btn:active { transform: scale(0.97); }
    #send-btn:disabled { opacity: 0.35; cursor: not-allowed; }

    .hint { margin-top: 8px; font-size: 11px; color: var(--muted); letter-spacing: 0.04em; }

    #toast {
      position: fixed;
      bottom: 90px; left: 50%;
      transform: translateX(-50%) translateY(10px);
      background: var(--surface);
      border: 1px solid var(--border);
      color: var(--text);
      font-size: 12px;
      padding: 8px 18px;
      border-radius: 20px;
      opacity: 0;
      transition: all 0.3s;
      pointer-events: none;
      z-index: 99;
    }

    #toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }
  </style>
</head>
<body>
<div class="shell">

  <header>
    <div class="brand">
      <h1>Epi<span>sodic</span></h1>
    </div>
    <div class="header-right">
      <button id="clear-btn">⌫ Clear Memory</button>
    </div>
  </header>

  <div id="chat">
    <div class="empty-state" id="empty">
      <div class="icon">🧠</div>
      <p>Every conversation is a memory.<br/>Start one.</p>
    </div>
  </div>

  <footer>
    <div class="input-row">
      <textarea id="user-input" placeholder="Say something…" rows="1"></textarea>
      <button id="send-btn">Send →</button>
    </div>
    <div class="hint">Episodic is AI and remembers everything· </div>
  </footer>

</div>

<div id="toast"></div>

<script>
  const chatEl  = document.getElementById('chat');
  const inputEl = document.getElementById('user-input');
  const sendBtn = document.getElementById('send-btn');
  const clearBtn= document.getElementById('clear-btn');
  const turnEl  = document.getElementById('turn-count');
  const toast   = document.getElementById('toast');

  async function loadHistory() {
    const res  = await fetch('/memory');
    const data = await res.json();
    if (data.turns > 0) {
      document.getElementById('empty')?.remove();
      data.history.forEach(turn => {
        appendMsg('user', turn.user);
        appendMsg('bot',  turn.assistant);
      });
      turnEl.textContent = data.turns;
      scrollBottom();
    }
  }

  function appendMsg(role, text) {
    const div = document.createElement('div');
    div.className = `msg ${role}`;
    div.innerHTML = `
      <div class="avatar">${role === 'user' ? 'U' : 'E'}</div>
      <div class="bubble">${formatText(text)}</div>`;
    chatEl.appendChild(div);
    scrollBottom();
    return div;
  }

  function showTyping() {
    const div = document.createElement('div');
    div.className = 'msg bot typing';
    div.id = 'typing';
    div.innerHTML = `
      <div class="avatar">E</div>
      <div class="bubble">
        <span class="dot"></span>
        <span class="dot"></span>
        <span class="dot"></span>
      </div>`;
    chatEl.appendChild(div);
    scrollBottom();
  }

  function hideTyping() { document.getElementById('typing')?.remove(); }

  function formatText(text) {
    return text
      .replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;')
      .replace(/`([^`]+)`/g, '<code>$1</code>')
      .replace(/\*\*(.+?)\*\*/g, '<strong>$1</strong>')
      .replace(/\n/g, '<br/>');
  }

  function scrollBottom() { chatEl.scrollTop = chatEl.scrollHeight; }

  function showToast(msg) {
    toast.textContent = msg;
    toast.classList.add('show');
    setTimeout(() => toast.classList.remove('show'), 2500);
  }

  async function sendMessage() {
    const text = inputEl.value.trim();
    if (!text) return;

    document.getElementById('empty')?.remove();
    inputEl.value = '';
    inputEl.style.height = 'auto';
    sendBtn.disabled = true;

    appendMsg('user', text);
    showTyping();

    try {
      const res  = await fetch('/chat', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ message: text })
      });
      const data = await res.json();
      hideTyping();
      appendMsg('bot', data.reply);
      turnEl.textContent = data.turn;
    } catch (e) {
      hideTyping();
      appendMsg('bot', 'Something went wrong. Please try again.');
    }

    sendBtn.disabled = false;
    inputEl.focus();
  }

  clearBtn.addEventListener('click', async () => {
    if (!confirm('Clear all memory? This cannot be undone.')) return;
    await fetch('/memory', { method: 'DELETE' });
    chatEl.innerHTML = `
      <div class="empty-state" id="empty">
        <div class="icon">🧠</div>
        <p>Every conversation is a memory.<br/>Start one.</p>
        <small>context persists across sessions</small>
      </div>`;
    turnEl.textContent = '0';
    showToast('Memory cleared. Fresh start.');
  });

  inputEl.addEventListener('input', () => {
    inputEl.style.height = 'auto';
    inputEl.style.height = Math.min(inputEl.scrollHeight, 140) + 'px';
  });

  inputEl.addEventListener('keydown', e => {
    if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); sendMessage(); }
  });

  sendBtn.addEventListener('click', sendMessage);

  loadHistory();
</script>
</body>
</html>
